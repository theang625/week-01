<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <title>Task01</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <main>
      <section>
        <div class="row">
          <div class="container-sm mt-5 pt-5 row bg-warning justify-content-center">
            <div
              class="d-flex flex-column w-50 justify-content-center align-items-center pb-5"
            >
              <h1 class="text-center mb-5">Number to string converter</h1>
              <input class="form-control w-50" type="text" id="number" placeholder="Enter Number: " />
              <button class="btn btn-primary mt-3" onclick="convertNumber()">
                Convert
              </button>
              <h3 id="result"></h3>
            </div>
            <a href="..//week-11/task02.html">Next page</a>
          </div>
        </div>
      </section>
    </main>
    <script>
      function convertNumber() {
        let number = document.getElementById('number').value;

        const words = {
          0: 'zero',
          1: 'one',
          2: 'two',
          3: 'three',
          4: 'four',
          5: 'five',
          6: 'six',
          7: 'seven',
          8: 'eight',
          9: 'nine',
        };

        let result = '';

        for (let i = 0; i < number.length; i++) {
          let digit = number[i];

          if (words[digit] !== undefined) {
            result += words[digit];
          } else {
            document.getElementById('result').innerHTML =
              'Please enter numbers only!';
            return;
          }
        }

        document.getElementById('result').innerHTML = result;
      }
    </script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
