<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <main>
      <div class="container">
        <div class="row">
          <div class="container-sm bg-secondary mt-5 pt-5">
            <div
              class="d-flex flex-column justify-content-center align-items-center pb-5"
            >
              <h1 class="text-center mb-5">Palindrome Number Checke</h1>
              <input
                class="form-control w-50"
                type="text"
                id="number"
                placeholder="Enter Number: "
              />
              <button class="btn btn-primary mt-3" onclick="checkPalindrome()">
                Check the number
              </button>
              <h3 id="result" class="text-light"></h3>
            </div>
            <a href="..//week-11/task03.html">Next page</a>
          </div>
        </div>
      </div>
    </main>

    <script>
      function checkPalindrome() {
        let number = document.getElementById("number").value.trim();

        // Validate input
        if (isNaN(number) || number === "") {
          document.getElementById("result").innerHTML =
            "Please enter a valid number.";
          return;
        }

        // Reverse the number string
        let reverse = number.split("").reverse().join("");

        // Compare and display result
        if (number === reverse) {
          document.getElementById("result").innerHTML =
            `${number} is a palindrome number.`;
        } else {
          document.getElementById("result").innerHTML =
            `${number} is not a palindrome number.`;
        }
      }
      </script>
    
    <!-- Bootstrap JavaScript Bundle (includes Popper) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
