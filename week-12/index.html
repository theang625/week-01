<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ITE Shop</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <nav class="navbar navbar-dark bg-dark shadow-sm">
      <div class="container-fluid px-4">
        <a class="navbar-brand fs-4" href="#">ITE Shop</a>

        <div class="text-white fs-5">
          Cart
          <span id="cart-count" class="badge bg-light text-dark ms-1"> 0 </span>
        </div>
      </div>
    </nav>

    <main class="container-fluid py-4 px-4">
      <div class="row g-4">
        <section class="col-lg-8">
          <div id="product-list" class="row g-4"></div>
        </section>

        <aside class="col-lg-4">
          <div class="card cart-card shadow-sm">
            <div class="card-header bg-primary text-white fs-5">Your Cart</div>

            <div id="cart-items" class="list-group list-group-flush">
              <div class="list-group-item text-muted">Cart is empty</div>
            </div>

            <div class="card-footer fs-5 fw-bold">
              Total: $<span id="cart-total">0.00</span>
            </div>
          </div>
        </aside>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="script.js"></script>
  </body>
</html>
