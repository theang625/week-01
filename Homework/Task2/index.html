<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Mini-Applications</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container my-5">
      <h1 class="text-center mb-5">Interactive Widget</h1>
      <div class="row justify-content-center g-4">
        <!-- Widget 1: Profile Card -->
        <div class="col-lg-5 col-md-8">
          <div class="card h-100 shadow-sm">
            <div class="card-body">
              <h3 class="card-title text-center mb-4">Grade Checker</h3>
              <form class="input-group mb-3" id=gradeForm">
                <input
                  type="number"
                id="score"
                  class="form-control"
                  placeholder="Enter score (0-100)"
                  min="0"
                  max="100"
                />
                <button
                  class="btn btn-primary"
                  type="button"
                  id="check-grade-btn"
                >
                  Check
                </button>
            </form>
              <div class="text-center">
                <p id="gradeResult" class="fs-5 fw-bold mt-3"></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Custom JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
