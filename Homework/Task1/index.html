<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Mini-Applications</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container my-5">
        <h1 class="text-center mb-5">Interactive Widget</h1>
        <div class="row justify-content-center g-4">

            <!-- Widget 1: Profile Card -->
            <div class="col-lg-4 col-md-6">
                <div class="card h-100 shadow-sm">
                    <div class="card-body text-center d-flex flex-column">
                        <img src="https://placehold.co/120x120/EFEFEF/333?text=Avatar" alt="Profile Picture" class="profile-img mx-auto mb-3">
                        <h3 class="card-title">Sok Dara</h3>
                        <p class="card-subtitle mb-3 text-muted">Information Technology Engineering</p>
                        
                        <p id="profile-more-info" class="card-text d-none">
                            I am a year 3 student at RUPP. I love web development and coffee.
                        </p>
                        
                        <button id="profile-toggle-btn" class="btn btn-primary mt-auto">Show more</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
