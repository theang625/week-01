<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Mini-Applications</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container my-5">
        <h1 class="text-center mb-5">Interactive Widget</h1>
        <div class="row justify-content-center g-4">

            <!-- Widget 1: Profile Card -->
            <div class="col-lg-6 col-md-8">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">My Tasks</h3>
                        <div class="input-group mb-3">
                            <input type="text" id="new-task-input" class="form-control" placeholder="New task...">
                            <button class="btn btn-primary" type="button" id="add-task-btn">Add</button>
                        </div>
                        <ul id="task-list" class="list-group mb-3"></ul>
                        <p id="task-counter" class="text-center text-muted m-0"></p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
