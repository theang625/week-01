<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Mini-Applications</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container my-5">
        <h1 class="text-center mb-5">Interactive Widget</h1>
        <div class="row justify-content-center g-4">

            <!-- Widget 1: Profile Card -->
            <div class="col-lg-6 col-md-8">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">Multiplication Table</h3>
                        <div class="input-group mb-3">
                            <input type="number" id="multiplier-input" class="form-control" placeholder="Enter a number">
                            <button class="btn btn-primary" type="button" id="generate-table-btn">Generate</button>
                        </div>
                        <div id="table-container">
                            <table class="table table-striped mt-4 d-none" id="multiplication-table">
                                <thead>
                                    <tr>
                                        <th>Expression</th>
                                        <th>Result</th>
                                    </tr>
                                </thead>
                                <tbody id="table-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
